<!DOCTYPE html>
<html lang="ru">

    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; --white: #ffffff; --text: #2c3e50; --border: #dcdde1; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; padding: 20px; }
        .app-container { width: 100%; max-width: 600px; background: var(--white); padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { font-size: 24px; text-align: center; margin-bottom: 30px; color: var(--primary); }
        h2 { font-size: 18px; margin-bottom: 15px; border-bottom: 2px solid var(--bg); padding-bottom: 10px; }
        .step { display: none; }
        .step.active { display: block; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button { padding: 15px; border: 1px solid var(--border); background: var(--white); border-radius: 8px; cursor: pointer; font-size: 16px; transition: all 0.2s; width: 100%; font-weight: 600; color: var(--primary); }
        button:hover { border-color: var(--accent); color: var(--accent); }
        button.primary { background: var(--accent); color: white; border: none; width: 100%; margin-top: 20px; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        /* СТИЛИ ДЛЯ ТРЕХУРОВНЕВОГО АККОРДЕОНА */
        /* 1 уровень: Глобальные вкладки */
        .global-btn {
            background-color: #e2e8f0;
            color: #1a202c;
            cursor: pointer;
            padding: 16px;
            width: 100%;
            text-align: left;
            border: 1px solid #cbd5e0;
            outline: none;
            font-size: 15px;
            font-weight: 700;
            border-radius: 8px;
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .global-btn:hover { background-color: #cbd5e0; }
        .global-btn.active { border-bottom-left-radius: 0; border-bottom-right-radius: 0; background-color: #cbd5e0; }
        .global-btn::after { content: '\25BC'; font-size: 11px; color: #4a5568; transition: transform 0.2s; }
        .global-btn.active::after { transform: rotate(180deg); }
        
        .global-panel {
            background-color: #f7fafc;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.25s ease-out;
            border: 1px solid #cbd5e0;
            border-top: none;
            border-radius: 0 0 8px 8px;
            padding: 0 10px;
        }

        /* 2 уровень: Внутренние подкатегории */
        .sub-btn {
            background-color: #ffffff;
            color: var(--primary);
            cursor: pointer;
            padding: 12px 14px;
            width: 100%;
            text-align: left;
            border: 1px solid var(--border);
            outline: none;
            font-size: 13px;
            font-weight: 600;
            border-radius: 6px;
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sub-btn:hover { background-color: #edf2f7; }
        .sub-btn.active { border-bottom-left-radius: 0; border-bottom-right-radius: 0; background-color: #edf2f7; margin-bottom: 0; }
        .sub-btn::after { content: '\25BC'; font-size: 9px; color: #a0aec0; transition: transform 0.2s; }
        .sub-btn.active::after { transform: rotate(180deg); }

        .sub-panel {
            background-color: var(--white);
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.25s ease-out;
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 6px 6px;
            padding: 0 10px;
            margin-bottom: 8px;
        }

        /* 3 уровень: Строки товаров */
        .item-row { display: grid; grid-template-columns: 2fr 1fr 1fr; align-items: center; padding: 10px 5px; border-bottom: 1px solid #edf2f7; }
        .item-row:last-child { border-bottom: none; }
        .item-name { font-weight: 500; font-size: 13px; color: #2d3748; }
        .item-unit { color: #7f8c8d; font-size: 11px; text-align: center; background: #edf2f7; padding: 4px 6px; border-radius: 4px; font-weight: 600; }
        input[type="number"] { width: 75px; padding: 6px; border: 1px solid var(--border); border-radius: 4px; text-align: center; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 13px; }
        
        /* Стили для старого плоского аккордеона (используется в Хоз. группе) */
        .accordion-btn {
            background-color: #f8f9fa; color: var(--primary); cursor: pointer; padding: 14px 16px; width: 100%; text-align: left; border: 1px solid var(--border); outline: none; font-size: 14px; font-weight: 700; transition: all 0.2s; border-radius: 6px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center;
        }
        .accordion-btn:hover { background-color: #edf2f7; border-color: #b8bfc6; }
        .accordion-btn.active { background-color: #edf2f7; border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
        .accordion-btn::after { content: '\25BC'; font-size: 10px; color: #7f8c8d; transition: transform 0.2s; }
        .accordion-btn.active::after { transform: rotate(180deg); }
        .accordion-panel { background-color: var(--white); max-height: 0; overflow: hidden; transition: max-height 0.25s ease-out; border: 1px solid var(--border); border-top: none; border-radius: 0 0 6px 6px; padding: 0 10px; }

        .summary { margin-top: 20px; padding: 15px; background: #fdfdfd; border: 1px dashed var(--border); }
        .btn-full { grid-column: span 2; margin-top: 10px; }
    </style>

</head>

<div class="app-container">
    <h1>Заявка на склад</h1>

    <div id="step1" class="step active">
        <h2>Выберите точку:</h2>
        <div class="btn-grid">
            <button onclick="openRestaurantMenu()">Ресторан "Галерея"</button>
            <button onclick="selectPoint('Лобби-бар')">Лобби-бар</button>
            <button onclick="selectPoint('Pool-бар')">Pool-бар</button>
            <button onclick="selectPoint('Кафе Чайка')">Кафе "Чайка"</button>
        </div>
    </div>

    <div id="step-rest-dept" class="step">
        <h2>Ресторан "Галерея" — Выберите отдел:</h2>
        <div class="btn-grid">
            <button onclick="selectRestaurantDept('Бар')">Бар</button>
            <button onclick="selectRestaurantDept('Кухня')">Кухня</button>
            <button onclick="changeStep(1)" class="btn-full">← Назад к точкам</button>
        </div>
    </div>

    <div id="step-rest-group" class="step">
        <h2 id="display-rest-dept"></h2>
        <p style="margin-bottom: 15px;">Что заказываем?</p>
        <div class="btn-grid">
            <button onclick="renderList('products')">Продовольствие</button>
            <button onclick="renderList('household')">Хоз. группа</button>
            <button onclick="backToRestaurantDept()" class="btn-full">← Назад к отделам</button>
        </div>
    </div>

    <div id="step2" class="step">
        <h2 id="display-point"></h2>
        <p style="margin-bottom: 15px;">Что заказываем?</p>
        <div class="btn-grid">
            <button onclick="renderList('products')">Продукты</button>
            <button onclick="renderList('household')">Хоз. группа</button>
            <button onclick="changeStep(1)" class="btn-full">← Назад</button>
        </div>
    </div>

    <div id="step3" class="step">
        <h2 id="display-category"></h2>
        <div id="items-container"></div>
        <button class="primary" onclick="showSummary()">Проверить заказ</button>
        <button onclick="handleBackFromItems()" style="margin-top: 10px; width: 100%;">← Назад</button>
    </div>

    <div id="step4" class="step">
        <h2>Проверьте данные:</h2>
        <div id="summary-content" class="summary"></div>
        <button id="send-btn" class="primary" onclick="sendOrder()">Отправить в торговый отдел</button>
        <button onclick="changeStep(3)" style="margin-top: 10px; width: 100%;">Исправить</button>
    </div>
</div>

    let orderData = { point: '', category: '', items: {} };
    let selectedRestaurantDepartment = '';

    function changeStep(stepIdOrNumber) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        if (typeof stepIdOrNumber === 'number') {
            document.getElementById(`step${stepIdOrNumber}`).classList.add('active');
        } else {
            document.getElementById(stepIdOrNumber).classList.add('active');
        }
    }

    function openRestaurantMenu() { changeStep('step-rest-dept'); }

    function selectRestaurantDept(deptName) {
        selectedRestaurantDepartment = deptName;
        orderData.point = `Ресторан Галерея — ${deptName}`; 
        document.getElementById('display-rest-dept').innerText = `Ресторан "Галерея" — ${deptName}`;
        changeStep('step-rest-group');
    }

    function backToRestaurantDept() { changeStep('step-rest-dept'); }

    function selectPoint(pointName) {
        orderData.point = pointName;
        document.getElementById('display-point').innerText = 'Точка: ' + pointName;
        changeStep(2);
    }

    function updateQty(itemName, qtyValue, unitType) {
        const val = parseFloat(qtyValue);
        if (val > 0) {
            orderData.items[itemName] = { qty: val, unit: unitType };
        } else {
            delete orderData.items[itemName];
        }
    }

    // ЛОГИКА СЛОЖНОГО ТРЁХУРОВНЕВОГО И ДВУХУРОВНЕВОГО РЕНДЕРА
    function renderList(type) {
        if (orderData.point.includes('Ресторан Галерея')) {
            orderData.category = type === 'products' ? 'Продовольствие' : 'Хоз. группа';
        } else {
            orderData.category = type === 'products' ? 'Продукты' : 'Хоз. группа';
        }
        
        document.getElementById('display-category').innerText = orderData.category;
        const container = document.getElementById('items-container');
        container.innerHTML = '';
        
        const activeList = database[orderData.point]?.[type] || [];
        
        if (activeList.length === 0) {
            container.innerHTML = '<div style="padding: 20px; text-align: center; color: #7f8c8d;">Список позиций пуст.</div>';
            changeStep(3);
            return;
        }

        // РЕЖИМ 1: СТАРАЯ ХОЗ. ГРУППА (Оставляем двухуровневый вид без изменений)
        if (type === 'household') {
            const groups = {};
            activeList.forEach(item => {
                if (!groups[item.cat]) groups[item.cat] = [];
                groups[item.cat].push(item);
            });
            
            for (const categoryName in groups) {
                const btn = document.createElement('button');
                btn.className = 'accordion-btn';
                btn.innerText = categoryName;

                const panel = document.createElement('div');
                panel.className = 'accordion-panel';

                groups[categoryName].forEach(item => {
                    const savedValue = orderData.items[item.name]?.qty || '';
                    const row = document.createElement('div');
                    row.className = 'item-row';
                    row.innerHTML = `
                        <div class="item-name">${item.name}</div>
                        <div class="item-unit">${item.unit}</div>
                        <input type="number" placeholder="0" min="0" value="${savedValue}" onchange="updateQty('${item.name}', this.value, '${item.unit}')">
                    `;
                    panel.appendChild(row);
                });

                btn.addEventListener('click', function() {
                    this.classList.toggle('active');
                    panel.style.maxHeight = panel.style.maxHeight ? null : panel.scrollHeight + "px";
                });

                container.appendChild(btn);
                container.appendChild(panel);
            }
            changeStep(3);
            return;
        }

        // РЕЖИМ 2: ПРОДУКТЫ / ПРОДОВОЛЬСТВИЕ (Новый трёхуровневый аккордеон)
        // Строим дерево: Глобальная категория -> Подкатегория -> Список товаров
        const tree = {};
        activeList.forEach(item => {
            const g = item.global || 'Прочее';
            const c = item.cat || 'Общее';
            if (!tree[g]) tree[g] = {};
            if (!tree[g][c]) tree[g][c] = [];
            tree[g][c].push(item);
        });

        // Строим HTML структуру динамически
        for (const globalName in tree) {
            // Кнопка 1-го уровня
            const gBtn = document.createElement('button');
            gBtn.className = 'global-btn';
            gBtn.innerText = globalName;

            // Панель 1-го уровня
            const gPanel = document.createElement('div');
            gPanel.className = 'global-panel';

            for (const subName in tree[globalName]) {
                // Кнопка 2-го уровня
                const subBtn = document.createElement('button');
                subBtn.className = 'sub-btn';
                subBtn.innerText = subName;

                // Панель 2-го уровня
                const subPanel = document.createElement('div');
                subPanel.className = 'sub-panel';

                // Наполнение товарами (3 уровень)
                tree[globalName][subName].forEach(item => {
                    const savedValue = orderData.items[item.name]?.qty || '';
                    const row = document.createElement('div');
                    row.className = 'item-row';
                    row.innerHTML = `
                        <div class="item-name">${item.name}</div>
                        <div class="item-unit">${item.unit}</div>
                        <input type="number" placeholder="0" min="0" value="${savedValue}" onchange="updateQty('${item.name}', this.value, '${item.unit}')">
                    `;
                    subPanel.appendChild(row);
                });

                // Логика клика на 2-й уровень
                subBtn.addEventListener('click', function(e) {
                    e.stopPropagation(); // чтобы не триггерить родительскую панель
                    this.classList.toggle('active');
                    
                    if (subPanel.style.maxHeight) {
                        subPanel.style.maxHeight = null;
                    } else {
                        subPanel.style.maxHeight = subPanel.scrollHeight + "px";
                        // Корректируем высоту родительской панели, чтобы она расширилась под новый размер
                        gPanel.style.maxHeight = (gPanel.scrollHeight + subPanel.scrollHeight) + "px";
                    }
                });

                gPanel.appendChild(subBtn);
                gPanel.appendChild(subPanel);
            }

            // Логика клика на 1-й уровень
            gBtn.addEventListener('click', function() {
                this.classList.toggle('active');
                if (gPanel.style.maxHeight) {
                    gPanel.style.maxHeight = null;
                } else {
                    gPanel.style.maxHeight = gPanel.scrollHeight + "px";
                }
            });

            container.appendChild(gBtn);
            container.appendChild(gPanel);
        }
        changeStep(3);
    }

    function handleBackFromItems() {
        if (orderData.point.includes('Ресторан Галерея')) {
            changeStep('step-rest-group');
        } else {
            changeStep(2);
        }
    }

    function showSummary() {
        const summary = document.getElementById('summary-content');
        const items = Object.entries(orderData.items);
        
        if (items.length === 0) { 
            alert('Вы ничего не выбрали!'); 
            return; 
        }
        
        let html = `<strong>Точка:</strong> ${orderData.point}<br><strong>Тип:</strong> ${orderData.category}<br><br>`;
        items.forEach(([name, itemObj]) => { 
            html += `• ${name}: <strong>${itemObj.qty} ${itemObj.unit}</strong><br>`; 
        });
        
        summary.innerHTML = html;
        changeStep(4);
    }

    async function sendOrder() {
        const btn = document.getElementById('send-btn');
        btn.disabled = true;
        btn.innerText = 'Отправка...';

        try {
            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                cache: 'no-cache',
                body: JSON.stringify(orderData)
            });
            alert('Заказ успешно отправлен!');
            location.reload();
        } catch (e) {
            alert('Ошибка при отправке: ' + e);
            btn.disabled = false;
            btn.innerText = 'Попробовать еще раз';
        }
    }
</script>
</body>
</html>
