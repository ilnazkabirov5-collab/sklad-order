<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система Заказов v1.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; --white: #ffffff; --text: #2c3e50; --border: #dcdde1; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; padding: 20px; }
        .app-container { width: 100%; max-width: 600px; background: var(--white); padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { font-size: 24px; text-align: center; margin-bottom: 30px; color: var(--primary); }
        h2 { font-size: 18px; margin-bottom: 15px; border-bottom: 2px solid var(--bg); padding-bottom: 10px; }
        .step { display: none; }
        .step.active { display: block; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button { padding: 15px; border: 1px solid var(--border); background: var(--white); border-radius: 8px; cursor: pointer; font-size: 16px; transition: all 0.2s; width: 100%; font-weight: 600; color: var(--primary); }
        button:hover { border-color: var(--accent); color: var(--accent); }
        button.primary { background: var(--accent); color: white; border: none; width: 100%; margin-top: 20px; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .item-row { display: grid; grid-template-columns: 2fr 1fr 1fr; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--bg); }
        .item-name { font-weight: 500; font-size: 14px; }
        .item-unit { color: #7f8c8d; font-size: 12px; text-align: center; }
        input[type="number"] { width: 80px; padding: 8px; border: 1px solid var(--border); border-radius: 4px; text-align: center; }
        .category-header { background: #f8f9fa; padding: 8px 12px; margin-top: 15px; font-weight: bold; font-size: 14px; color: #7f8c8d; border-radius: 4px; }
        .summary { margin-top: 20px; padding: 15px; background: #fdfdfd; border: 1px dashed var(--border); }
    </style>
<link rel="icon" type="image/png" href="https://img.icons8.com/fluency/48/restaurant.png">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/180/restaurant.png"></head>
<body>

<div class="app-container">
    <h1>Заявка на склад</h1>

    <div id="step1" class="step active">
        <h2>Выберите точку:</h2>
        <div class="btn-grid">
            <button onclick="selectPoint('Ресторан Галерея')">Ресторан "Галерея"</button>
            <button onclick="selectPoint('Лобби-бар')">Лобби-бар</button>
            <button onclick="selectPoint('Pool-бар')">Pool-бар</button>
            <button onclick="selectPoint('Кафе Чайка')">Кафе "Чайка"</button>
        </div>
    </div>

    <div id="step2" class="step">
        <h2 id="display-point"></h2>
        <p style="margin-bottom: 15px;">Что заказываем?</p>
        <div class="btn-grid">
            <button onclick="renderList('products')">Продукты</button>
            <button onclick="renderList('household')">Хоз. группа</button>
        </div>
        <button onclick="changeStep(1)" style="margin-top: 20px; width: 100%;">← Назад</button>
    </div>

    <div id="step3" class="step">
        <h2 id="display-category"></h2>
        <div id="items-container"></div>
        <button class="primary" onclick="showSummary()">Проверить заказ</button>
        <button onclick="changeStep(2)" style="margin-top: 10px; width: 100%;">← Назад</button>
    </div>

    <div id="step4" class="step">
        <h2>Проверьте данные:</h2>
        <div id="summary-content" class="summary"></div>
        <button id="send-btn" class="primary" onclick="sendOrder()">Отправить в торговый отдел</button>
        <button onclick="changeStep(3)" style="margin-top: 10px; width: 100%;">Исправить</button>
    </div>
</div>

                { cat: 'Напитки безалкогольные', name: 'Кола RICH стекло 0,5 1уп.(12шт)', unit: 'уп' },

        'Pool-бар': {

                { cat: 'Напитки', name: 'Свежая мята', unit: 'кг' },

            ],

            ]
        },

                { cat: 'Выпечка', name: 'Мука высший сорт', unit: 'кг' },
                { cat: 'Кондитерка', name: 'Сахарная пудра', unit: 'кг' }

            ]
        }
    };

    // Главный объект текущего заказа
    let orderData = {
        point: '',
        category: '',
        items: {} 
    };

    // Функция переключения экранов (универсальная)
    function changeStep(stepNumber) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById(`step${stepNumber}`).classList.add('active');
    }

    // Выбор точки (Шаг 1)
    function selectPoint(pointName) {
        orderData.point = pointName;
        document.getElementById('display-point').innerText = 'Точка: ' + pointName;
        changeStep(2);
    }

    // Запись количества и единицы измерения
    function updateQty(itemName, qtyValue, unitType) {
        const val = parseFloat(qtyValue);
        if (val > 0) {
            orderData.items[itemName] = {
                qty: val,
                unit: unitType
            };
        } else {
            delete orderData.items[itemName];
        }
    }

    // Отрисовка списка товаров (Шаг 3)
    function renderList(type) {
        orderData.category = type === 'products' ? 'Продукты' : 'Хоз. группа';
        document.getElementById('display-category').innerText = orderData.category;
        
        const container = document.getElementById('items-container');
        container.innerHTML = '';
        
        const currentPoint = orderData.point; 
        const activeList = database[currentPoint]?.[type] || [];
        
        if (activeList.length === 0) {
            container.innerHTML = '<div style="padding: 20px; text-align: center; color: #7f8c8d;">Для этой точки список позиций еще не заполнен.</div>';
            changeStep(3);
            return;
        }
        
        let currentCat = '';
        activeList.forEach(item => {
            if (item.cat !== currentCat) {
                currentCat = item.cat;
                const catHeader = document.createElement('div');
                catHeader.className = 'category-header';
                catHeader.innerText = currentCat;
                container.appendChild(catHeader);
            }
            
            // Проверяем, вводилось ли уже количество для этого товара ранее
            const savedValue = orderData.items[item.name]?.qty || '';
            
            const row = document.createElement('div');
            row.className = 'item-row';
            row.innerHTML = `
                <div class="item-name">${item.name}</div>
                <div class="item-unit">${item.unit}</div>
                <input type="number" placeholder="0" min="0" value="${savedValue}" onchange="updateQty('${item.name}', this.value, '${item.unit}')">
            `;
            container.appendChild(row);
        });
        changeStep(3);
    }

    // Показ экрана итоговой проверки (Шаг 4)
    function showSummary() {
        const summary = document.getElementById('summary-content');
        const items = Object.entries(orderData.items);
        
        if (items.length === 0) { 
            alert('Вы ничего не выбрали!'); 
            return; 
        }
        
        let html = `<strong>Точка:</strong> ${orderData.point}<br><strong>Тип:</strong> ${orderData.category}<br><br>`;
        items.forEach(([name, itemObj]) => { 
            html += `• ${name}: <strong>${itemObj.qty} ${itemObj.unit}</strong><br>`; 
        });
        
        summary.innerHTML = html;
        changeStep(4);
    }

    // Отправка данных в Google Apps Script
    async function sendOrder() {
        const btn = document.getElementById('send-btn');
        btn.disabled = true;
        btn.innerText = 'Отправка...';

        try {
            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                cache: 'no-cache',
                body: JSON.stringify(orderData)
            });
            alert('Заказ успешно отправлен!');
            location.reload();
        } catch (e) {
            alert('Ошибка при отправке: ' + e);
            btn.disabled = false;
            btn.innerText = 'Попробовать еще раз';
        }
    }
</script>
