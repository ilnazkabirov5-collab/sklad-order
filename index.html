<!DOCTYPE html>
<html lang="ru">
<head>

    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; --white: #ffffff; --text: #2c3e50; --border: #dcdde1; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; padding: 20px; }
        .app-container { width: 100%; max-width: 600px; background: var(--white); padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { font-size: 24px; text-align: center; margin-bottom: 30px; color: var(--primary); }
        h2 { font-size: 18px; margin-bottom: 15px; border-bottom: 2px solid var(--bg); padding-bottom: 10px; }
        .step { display: none; }
        .step.active { display: block; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button { padding: 15px; border: 1px solid var(--border); background: var(--white); border-radius: 8px; cursor: pointer; font-size: 16px; transition: all 0.2s; width: 100%; font-weight: 600; color: var(--primary); }
        button:hover { border-color: var(--accent); color: var(--accent); }
        button.primary { background: var(--accent); color: white; border: none; width: 100%; margin-top: 20px; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        /* СТИЛИ ДЛЯ ТРЕХУРОВНЕВОГО АККОРДЕОНА */
        /* 1 уровень: Глобальные вкладки */
        .global-btn {
            background-color: #e2e8f0;
            color: #1a202c;
            cursor: pointer;
            padding: 16px;
            width: 100%;
            text-align: left;
            border: 1px solid #cbd5e0;
            outline: none;
            font-size: 15px;
            font-weight: 700;
            border-radius: 8px;
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .global-btn:hover { background-color: #cbd5e0; }
        .global-btn.active { border-bottom-left-radius: 0; border-bottom-right-radius: 0; background-color: #cbd5e0; }
        .global-btn::after { content: '\25BC'; font-size: 11px; color: #4a5568; transition: transform 0.2s; }
        .global-btn.active::after { transform: rotate(180deg); }
        
        .global-panel {
            background-color: #f7fafc;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.25s ease-out;
            border: 1px solid #cbd5e0;
            border-top: none;
            border-radius: 0 0 8px 8px;
            padding: 0 10px;
        }

        /* 2 уровень: Внутренние подкатегории */
        .sub-btn {
            background-color: #ffffff;
            color: var(--primary);
            cursor: pointer;
            padding: 12px 14px;
            width: 100%;
            text-align: left;
            border: 1px solid var(--border);
            outline: none;
            font-size: 13px;
            font-weight: 600;
            border-radius: 6px;
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sub-btn:hover { background-color: #edf2f7; }
        .sub-btn.active { border-bottom-left-radius: 0; border-bottom-right-radius: 0; background-color: #edf2f7; margin-bottom: 0; }
        .sub-btn::after { content: '\25BC'; font-size: 9px; color: #a0aec0; transition: transform 0.2s; }
        .sub-btn.active::after { transform: rotate(180deg); }

        .sub-panel {
            background-color: var(--white);
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.25s ease-out;
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 6px 6px;
            padding: 0 10px;
            margin-bottom: 8px;
        }

        /* 3 уровень: Строки товаров */
        .item-row { display: grid; grid-template-columns: 2fr 1fr 1fr; align-items: center; padding: 10px 5px; border-bottom: 1px solid #edf2f7; }
        .item-row:last-child { border-bottom: none; }
        .item-name { font-weight: 500; font-size: 13px; color: #2d3748; }
        .item-unit { color: #7f8c8d; font-size: 11px; text-align: center; background: #edf2f7; padding: 4px 6px; border-radius: 4px; font-weight: 600; }
        input[type="number"] { width: 75px; padding: 6px; border: 1px solid var(--border); border-radius: 4px; text-align: center; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 13px; }
        
        /* Стили для старого плоского аккордеона (используется в Хоз. группе) */
        .accordion-btn {
            background-color: #f8f9fa; color: var(--primary); cursor: pointer; padding: 14px 16px; width: 100%; text-align: left; border: 1px solid var(--border); outline: none; font-size: 14px; font-weight: 700; transition: all 0.2s; border-radius: 6px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center;
        }
        .accordion-btn:hover { background-color: #edf2f7; border-color: #b8bfc6; }
        .accordion-btn.active { background-color: #edf2f7; border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
        .accordion-btn::after { content: '\25BC'; font-size: 10px; color: #7f8c8d; transition: transform 0.2s; }
        .accordion-btn.active::after { transform: rotate(180deg); }
        .accordion-panel { background-color: var(--white); max-height: 0; overflow: hidden; transition: max-height 0.25s ease-out; border: 1px solid var(--border); border-top: none; border-radius: 0 0 6px 6px; padding: 0 10px; }

        .summary { margin-top: 20px; padding: 15px; background: #fdfdfd; border: 1px dashed var(--border); }
        .btn-full { grid-column: span 2; margin-top: 10px; }
    </style>

</head>

<div class="app-container">
    <h1>Заявка на склад</h1>

    <div id="step1" class="step active">
        <h2>Выберите точку:</h2>
        <div class="btn-grid">
            <button onclick="openRestaurantMenu()">Ресторан "Галерея"</button>
            <button onclick="selectPoint('Лобби-бар')">Лобби-бар</button>
            <button onclick="selectPoint('Pool-бар')">Pool-бар</button>
            <button onclick="selectPoint('Кафе Чайка')">Кафе "Чайка"</button>
        </div>
    </div>

    <div id="step-rest-dept" class="step">
        <h2>Ресторан "Галерея" — Выберите отдел:</h2>
        <div class="btn-grid">
            <button onclick="selectRestaurantDept('Бар')">Бар</button>
            <button onclick="selectRestaurantDept('Кухня')">Кухня</button>
            <button onclick="changeStep(1)" class="btn-full">← Назад к точкам</button>
        </div>
    </div>

    <div id="step-rest-group" class="step">
        <h2 id="display-rest-dept"></h2>
        <p style="margin-bottom: 15px;">Что заказываем?</p>
        <div class="btn-grid">
            <button onclick="renderList('products')">Продовольствие</button>
            <button onclick="renderList('household')">Хоз. группа</button>
            <button onclick="backToRestaurantDept()" class="btn-full">← Назад к отделам</button>
        </div>
    </div>

    <div id="step2" class="step">
        <h2 id="display-point"></h2>
        <p style="margin-bottom: 15px;">Что заказываем?</p>
        <div class="btn-grid">
            <button onclick="renderList('products')">Продукты</button>
            <button onclick="renderList('household')">Хоз. группа</button>
            <button onclick="changeStep(1)" class="btn-full">← Назад</button>
        </div>
    </div>

    <div id="step3" class="step">
        <h2 id="display-category"></h2>
        <div id="items-container"></div>
        <button class="primary" onclick="showSummary()">Проверить заказ</button>
        <button onclick="handleBackFromItems()" style="margin-top: 10px; width: 100%;">← Назад</button>
    </div>

    <div id="step4" class="step">
        <h2>Проверьте данные:</h2>
        <div id="summary-content" class="summary"></div>
        <button id="send-btn" class="primary" onclick="sendOrder()">Отправить в торговый отдел</button>
        <button onclick="changeStep(3)" style="margin-top: 10px; width: 100%;">Исправить</button>
    </div>
</div>

    // ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ СОСТОЯНИЯ
    let currentPoint = '';
    let currentGroup = ''; 
    let isRestaurantMode = false;
    let selectedRestaurantDept = ''; 

    function changeStep(stepNum) {
        document.querySelectorAll('.step').forEach(step => step.classList.remove('active'));
        document.getElementById(`step${stepNum}`).classList.add('active');
    }

    function openRestaurantMenu() {
        isRestaurantMode = true;
        document.querySelectorAll('.step').forEach(step => step.classList.remove('active'));
        document.getElementById('step-rest-dept').add ? document.getElementById('step-rest-dept').add('active') : document.getElementById('step-rest-dept').classList.add('active');
    }

    function selectRestaurantDept(dept) {
        selectedRestaurantDept = dept;
        currentPoint = `Ресторан Галерея — ${dept}`;
        document.getElementById('display-rest-dept').innerText = currentPoint;
        document.querySelectorAll('.step').forEach(step => step.classList.remove('active'));
        document.getElementById('step-rest-group').classList.add('active');
    }

    function backToRestaurantDept() {
        document.querySelectorAll('.step').forEach(step => step.classList.remove('active'));
        document.getElementById('step-rest-dept').classList.add('active');
    }

    function selectPoint(pointName) {
        isRestaurantMode = false;
        currentPoint = pointName;
        document.getElementById('display-point').innerText = currentPoint;
        changeStep(2);
    }

    function handleBackFromItems() {
        if (isRestaurantMode) {
            document.querySelectorAll('.step').forEach(step => step.classList.remove('active'));
            document.getElementById('step-rest-group').classList.add('active');
        } else {
            changeStep(2);
        }
    }

    function renderList(groupType) {
        currentGroup = groupType;
        const container = document.getElementById('items-container');
        container.innerHTML = '';
        
        const headingText = currentGroup === 'products' ? 'Продукты / Продовольствие' : 'Хоз. группа';
        document.getElementById('display-category').innerText = `${currentPoint} — ${headingText}`;

        const items = database[currentPoint]?.[currentGroup] || [];

        if (groupType === 'products') {
            // ТРЁХУРОВНЕВАЯ СТРУКТУРА (АККОРДЕОН В АККОРДЕОНЕ)
            const structure = {};
            items.forEach(item => {
                if (!structure[item.global]) structure[item.global] = {};
                if (!structure[item.global][item.cat]) structure[item.global][item.cat] = [];
                structure[item.global][item.cat].push(item);
            });

            for (const globalName in structure) {
                const gBtn = document.createElement('button');
                gBtn.className = 'global-btn';
                gBtn.innerText = globalName;
                
                const gPanel = document.createElement('div');
                gPanel.className = 'global-panel';

                for (const subName in structure[globalName]) {
                    const sBtn = document.createElement('button');
                    sBtn.className = 'sub-btn';
                    sBtn.innerText = subName;
                    
                    const sPanel = document.createElement('div');
                    sPanel.className = 'sub-panel';

                    structure[globalName][subName].forEach(item => {
                        const row = document.createElement('div');
                        row.className = 'item-row';
                        row.innerHTML = `
                            <div class="item-name">${item.name}</div>
                            <div><span class="item-unit">${item.unit}</span></div>
                            <div><input type="number" min="0" placeholder="0" data-name="${item.name}" data-unit="${item.unit}" data-global="${item.global}" data-cat="${item.cat}"></div>
                        `;
                        sPanel.appendChild(row);
                    });

                    sBtn.onclick = function() {
                        this.classList.toggle('active');
                        if (sPanel.style.maxHeight) {
                            sPanel.style.maxHeight = null;
                        } else {
                            sPanel.style.maxHeight = sPanel.scrollHeight + "px";
                            gPanel.style.maxHeight = (gPanel.scrollHeight + sPanel.scrollHeight) + "px";
                        }
                    };

                    gPanel.appendChild(sBtn);
                    gPanel.appendChild(sPanel);
                }

                gBtn.onclick = function() {
                    this.classList.toggle('active');
                    if (gPanel.style.maxHeight) {
                        gPanel.style.maxHeight = null;
                    } else {
                        gPanel.style.maxHeight = gPanel.scrollHeight + "px";
                    }
                };

                container.appendChild(gBtn);
                container.appendChild(gPanel);
            }
        } else {
            // ДВУХУРОВНЕВАЯ СТРУКТУРА ДЛЯ ХОЗ. ТОВАРОВ
            const structure = {};
            items.forEach(item => {
                if (!structure[item.cat]) structure[item.cat] = [];
                structure[item.cat].push(item);
            });

            for (const catName in structure) {
                const btn = document.createElement('button');
                btn.className = 'accordion-btn';
                btn.innerText = catName;
                
                const panel = document.createElement('div');
                panel.className = 'accordion-panel';

                structure[catName].forEach(item => {
                    const row = document.createElement('div');
                    row.className = 'item-row';
                    row.innerHTML = `
                        <div class="item-name">${item.name}</div>
                        <div><span class="item-unit">${item.unit}</span></div>
                        <div><input type="number" min="0" placeholder="0" data-name="${item.name}" data-unit="${item.unit}" data-global="Хоз. группа" data-cat="${item.cat}"></div>
                    `;
                    panel.appendChild(row);
                });

                btn.onclick = function() {
                    this.classList.toggle('active');
                    if (panel.style.maxHeight) {
                        panel.style.maxHeight = null;
                    } else {
                        panel.style.maxHeight = panel.scrollHeight + "px";
                    }
                };

                container.appendChild(btn);
                container.appendChild(panel);
            }
        }

        changeStep(3);
    }

    function showSummary() {
        const inputs = document.querySelectorAll('#items-container input[type="number"]');
        let hasData = false;
        let html = `<p><strong>Точка:</strong> ${currentPoint}</p>`;
        html += `<p><strong>Тип заявки:</strong> ${currentGroup === 'products' ? 'Продукты' : 'Хоз. товары'}</p><hr>`;

        inputs.forEach(input => {
            const val = parseInt(input.value);
            if (val > 0) {
                hasData = true;
                html += `<p style="margin: 6px 0; font-size: 14px;">• ${input.dataset.name} — <strong>${val} ${input.dataset.unit}</strong></p>`;
            }
        });

        if (!hasData) {
            alert('Пожалуйста, введите количество хотя бы для одного товара!');
            return;
        }

        document.getElementById('summary-content').innerHTML = html;
        changeStep(4);
    }

    function sendOrder() {
        const sendBtn = document.getElementById('send-btn');
        sendBtn.disabled = true;
        sendBtn.innerText = 'Отправка...';

        const inputs = document.querySelectorAll('#items-container input[type="number"]');
        const orderItems = [];

        inputs.forEach(input => {
            const val = parseInt(input.value);
            if (val > 0) {
                orderItems.push({
                    global: input.dataset.global || '',
                    category: input.dataset.cat || '',
                    name: input.dataset.name,
                    quantity: val,
                    unit: input.dataset.unit
                });
            }
        });

        const payload = {
            point: currentPoint,
            group: currentGroup,
            items: orderItems
        };

        fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors',
            cache: 'no-cache',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(() => {
            alert('Заявка успешно отправлена в торговый отдел!');
            location.reload();
        })
        .catch(err => {
            alert('Ошибка при отправке: ' + err);
            sendBtn.disabled = false;
            sendBtn.innerText = 'Отправить в торговый отдел';
        });
    }
</script>

</body>
</html>
